version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hakimi-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hakimi_visa
      MYSQL_USER: hakimi
      MYSQL_PASSWORD: hakimi_pass
    ports:
      - '3307:3306'
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data_dev:

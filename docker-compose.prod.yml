services:
  mysql:
    image: mysql:8.0
    container_name: hakimi-mysql
    restart: always
    env_file: .env.prod
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hakimi

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: hakimi-backend
    restart: always
    ports:
      - '4000:4000'
    env_file: .env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-hakimi_visa}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      APP_URL: ${APP_URL}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/secrets:/app/secrets:ro
    networks:
      - hakimi

  nginx:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    container_name: hakimi-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file: .env.prod
    volumes:
      - ./docker/nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - hakimi

networks:
  hakimi:
    driver: bridge

volumes:
  mysql_data:

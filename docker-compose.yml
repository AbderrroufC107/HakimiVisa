services:
  mysql:
    image: mysql:8.0
    container_name: hakimi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hakimi_visa}
      MYSQL_USER: ${MYSQL_USER:-hakimi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hakimi_pass}
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: hakimi-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://root:root@mysql:3306/hakimi_visa
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-refresh-key}
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      APP_URL: http://localhost:5173
      FIREBASE_CREDENTIALS: secrets/hakimivisa-app-firebase-adminsdk-fbsvc-3494ed0331.json
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/secrets:/app/secrets

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: hakimi-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:4000/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

volumes:
  mysql_data:

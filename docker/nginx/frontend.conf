server {
    listen 80;
    server_name hakimivisa.cloud www.hakimivisa.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hakimivisa.cloud www.hakimivisa.cloud;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/hakimivisa.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hakimivisa.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # --- Performance: Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml application/xml+rss
        application/xhtml+xml application/rss+xml application/xml
        image/svg+xml font/woff font/woff2;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- API proxy ---
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # --- WebSocket ---
    location /socket.io/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Static assets: aggressive caching ---
    # Hashed filenames (Vite-generated) -> immutable 1 year cache
    location ~* assets/.*\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Other static files: 30 days cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- HTML: no cache (always get fresh index.html for SPA) ---
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
